# AgentCli shared services — long-running side processes that every CLI
# session can reach. Started by `c compose-start` and auto-started the first
# time a `c <cli> [os|wsl|]` runs after an OS reboot.
#
# Network model: all services bind to localhost on the host; the AgentCli
# Docker container runs with --network host so it reaches them via
# localhost:<port>. macOS/Windows Docker Desktop maps `host.docker.internal`
# to the host gateway for the MCP service to find the user's Chrome.

name: agentcli

# Shared base for the chrome-devtools-mcp-* services. Each instance reads its
# target Chrome debug port from $CHROME_DEBUG_PORT, so callers control the
# binding via the environment override on the service (or the .env file) — not
# baked into the compose definition. Listens on port 8765 internally; the
# instance maps it to a unique host port. The image is built from
# ./services/chrome-devtools-mcp — its entrypoint supervises supergateway and
# recycles it when host Chrome flaps, so --stateful sessions recover after a
# Chrome restart.
x-chrome-devtools-mcp-base: &chrome-devtools-mcp-base
  build: ./services/chrome-devtools-mcp
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://localhost:8765/healthz >/dev/null 2>&1 || exit 1"]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 60s

services:
  # Chrome DevTools MCP instances. Each bridges stdio chrome-devtools-mcp to
  # streamable HTTP via supergateway. Two instances let us drive two Chromes
  # with separate cookie jars (e.g. `c chrome*2`) for multi-user UI tests.
  # Override CHROME_DEBUG_PORT_{1,2} in the environment or `.env` to rebind.
  chrome-devtools-mcp-1:
    <<: *chrome-devtools-mcp-base
    ports:
      - "8765:8765"
    environment:
      CHROME_DEVTOOLS_MCP_NO_USAGE_STATISTICS: "1"
      CHROME_DEBUG_PORT: "${CHROME_DEBUG_PORT_1:-9222}"

  chrome-devtools-mcp-2:
    <<: *chrome-devtools-mcp-base
    ports:
      - "8766:8765"
    environment:
      CHROME_DEVTOOLS_MCP_NO_USAGE_STATISTICS: "1"
      CHROME_DEBUG_PORT: "${CHROME_DEBUG_PORT_2:-9223}"
